name: Deploy dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Package application
        run: |
          tar \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='monitor.db*' \
            -czf /tmp/site-dashboard.tar.gz \
            app.py README.md static .gitignore

      - name: Deploy over SSH
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_FAMILY: ${{ secrets.DEPLOY_SSH_FAMILY }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOST}" ] || [ -z "${DEPLOY_USER}" ] || [ -z "${SSHPASS}" ]; then
            echo "DEPLOY_HOST, DEPLOY_USER and DEPLOY_PASSWORD secrets are required" >&2
            exit 1
          fi

          PORT="${DEPLOY_PORT:-22}"
          SSH_FAMILY="${DEPLOY_SSH_FAMILY:-}"
          SCP_HOST="${DEPLOY_HOST}"

          if [ -z "${SSH_FAMILY}" ]; then
            case "${DEPLOY_HOST}" in
              *:*)
                SSH_FAMILY="-6"
                SCP_HOST="[${DEPLOY_HOST}]"
                ;;
              *)
                SSH_FAMILY="-4"
                ;;
            esac
          elif [ "${SSH_FAMILY}" = "-6" ]; then
            SCP_HOST="[${DEPLOY_HOST}]"
          fi

          SSH_OPTS="${SSH_FAMILY} -p ${PORT} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          sshpass -e ssh ${SSH_OPTS} "${DEPLOY_USER}@${DEPLOY_HOST}" 'mkdir -p /opt/site-dashboard'
          sshpass -e scp ${SSH_FAMILY} -P "${PORT}" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            /tmp/site-dashboard.tar.gz "${DEPLOY_USER}@${SCP_HOST}:/tmp/site-dashboard.tar.gz"

          sshpass -e ssh ${SSH_OPTS} "${DEPLOY_USER}@${DEPLOY_HOST}" 'bash -s' <<'REMOTE'
          set -euo pipefail

          mkdir -p /opt/site-dashboard /var/lib/site-dashboard
          rm -rf /opt/site-dashboard/static
          rm -f /opt/site-dashboard/app.py /opt/site-dashboard/README.md /opt/site-dashboard/.gitignore
          tar -xzf /tmp/site-dashboard.tar.gz -C /opt/site-dashboard
          rm -f /tmp/site-dashboard.tar.gz

          if ! command -v python3 >/dev/null 2>&1; then
            apt-get update
            apt-get install -y python3
          fi

          if ! id -u site-dashboard >/dev/null 2>&1; then
            useradd --system --home-dir /opt/site-dashboard --shell /usr/sbin/nologin site-dashboard
          fi

          find /opt/site-dashboard -type d -exec chmod 755 {} \;
          find /opt/site-dashboard -type f -exec chmod 644 {} \;
          chown -R root:root /opt/site-dashboard
          chown -R site-dashboard:site-dashboard /var/lib/site-dashboard
          chmod 750 /var/lib/site-dashboard

          cat >/etc/systemd/system/site-dashboard.service <<'UNIT'
          [Unit]
          Description=Site availability and SSL dashboard
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=site-dashboard
          Group=site-dashboard
          WorkingDirectory=/opt/site-dashboard
          Environment=DASHBOARD_HOST=127.0.0.1
          Environment=DASHBOARD_PORT=8000
          Environment=DASHBOARD_DB=/var/lib/site-dashboard/monitor.db
          Environment=CHECK_INTERVAL_SECONDS=600
          Environment=SESSION_TTL_HOURS=12
          ExecStart=/usr/bin/python3 /opt/site-dashboard/app.py
          Restart=always
          RestartSec=5
          StateDirectory=site-dashboard
          NoNewPrivileges=true
          PrivateTmp=true

          [Install]
          WantedBy=multi-user.target
          UNIT

          systemctl daemon-reload
          systemctl enable site-dashboard.service
          systemctl restart site-dashboard.service
          sleep 2
          systemctl --no-pager --full status site-dashboard.service
          REMOTE
